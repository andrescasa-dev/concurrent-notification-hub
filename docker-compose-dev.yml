services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: thc-api-dev
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-thc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-thc}
      POSTGRES_DB: ${POSTGRES_DB:-thc}
      POSTGRES_HOST_PORT: 5432
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    command: >
      sh -c "pnpm migration:run && pnpm start:prod"
