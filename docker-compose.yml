name: thc-mentoria-notifications-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: thc-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-thc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-thc}
      POSTGRES_DB: ${POSTGRES_DB:-thc}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-thc} -d ${POSTGRES_DB:-thc}',
        ]
      interval: 2s
      timeout: 5s
      retries: 15
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
